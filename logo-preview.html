<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embera · 余温 Logo 预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #FFF5EE 0%, #FFE8D6 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 4px 20px rgba(255,94,120,0.08);
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card img {
      width: 100%;
      max-width: 200px;
      height: auto;
      image-rendering: -webkit-optimize-contrast;
    }
    .card .name {
      margin-top: 16px;
      font-size: 17px;
      font-weight: 600;
      color: #333;
    }
    .card .desc {
      margin-top: 6px;
      font-size: 14px;
      color: #666;
    }
    .selected {
      border: 3px solid #FF9E5E;
      box-shadow: 0 0 0 4px rgba(255,158,94,0.15);
    }
    .selected .name { color: #FF5E78; }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Embera · 余温</h1>
    <p class="subtitle">请选择最符合品牌调性的 Logo 变体（回复编号 1-6）</p>
    
    <div class="grid" id="grid">

      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://n.uguu.se/PzBumccM.png" alt="【1】单曲线余烬" loading="lazy">
        <div class="name">【1]</div>
        <div class="desc">单曲线余烬</div>
      </div>
    
      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://o.uguu.se/GGWZpxsU.png" alt="【2】双弧交汇" loading="lazy">
        <div class="name">【2]</div>
        <div class="desc">双弧交汇</div>
      </div>
    
      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://h.uguu.se/YfwamagN.png" alt="【3】光点涟漪" loading="lazy">
        <div class="name">【3]</div>
        <div class="desc">光点涟漪</div>
      </div>
    
      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://o.uguu.se/KovnVqFO.png" alt="【4】C形拥抱" loading="lazy">
        <div class="name">【4]</div>
        <div class="desc">C形拥抱</div>
      </div>
    
      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://o.uguu.se/oGsninvh.png" alt="【5】抽象火焰" loading="lazy">
        <div class="name">【5]</div>
        <div class="desc">抽象火焰</div>
      </div>
    
      <div class="card" onclick="this.classList.toggle('selected')">
        <img src="https://n.uguu.se/OdMYgPzu.png" alt="【6】E形抽象" loading="lazy">
        <div class="name">【6]</div>
        <div class="desc">E形抽象</div>
      </div>
    
    </div>
    
    <p class="footer">设计说明：暖橙渐变 #FFD9A8 → #FF9E5E → #FF5E78 | 极简抽象符号</p>
  </div>
  
  <script>
    // 点击卡片选中/取消
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('selected');
      });
    });
  </script>
</body>
</html>
