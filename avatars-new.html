<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embera · 新头像预览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a14;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    padding: 30px 20px;
    color: #fff;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #FFB366, #FF7A3D, #FF5E78);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 30px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 12px;
    text-align: center;
  }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid rgba(255,158,94,0.3);
    margin-bottom: 10px;
  }
  .card .name {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .card .role {
    font-size: 11px;
    color: #888;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<h1>Embera · 余温</h1>
<div class="subtitle">新头像预览（8张已替换）</div>

<div class="grid">
  <div class="card">
    <img src="src/assets/avatars/gf_gentle.jpg">
    <div class="name">温柔学姐</div>
    <div class="role">AI 女友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/gf_bubbly.jpg">
    <div class="name">元气少女</div>
    <div class="role">AI 女友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/gf_tsundere.jpg">
    <div class="name">傲娇大小姐</div>
    <div class="role">AI 女友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/gf_intellectual.jpg">
    <div class="name">知性御姐</div>
    <div class="role">AI 女友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/bf_sunny.jpg">
    <div class="name">阳光学长</div>
    <div class="role">AI 男友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/bf_cold.jpg">
    <div class="name">腹黑总裁</div>
    <div class="role">AI 男友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/bf_steady.jpg">
    <div class="name">稳重哥哥</div>
    <div class="role">AI 男友</div>
  </div>
  <div class="card">
    <img src="src/assets/avatars/bf_young.jpg">
    <div class="name">年下弟弟</div>
    <div class="role">AI 男友</div>
  </div>
</div>

</body>
</html>
