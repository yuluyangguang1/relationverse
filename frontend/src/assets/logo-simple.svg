<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/><stop offset="40%" style="stop-color:#6d28d9"/><stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="su" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/><stop offset="50%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="hl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/><stop offset="60%" style="stop-color:#fff;stop-opacity:0.04"/><stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="brd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.25"/><stop offset="100%" style="stop-color:#fff;stop-opacity:0.06"/>
    </linearGradient>
    <radialGradient id="hg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="mc"><circle cx="256" cy="256" r="240"/></clipPath>
    <filter id="ss"><feDropShadow dx="0" dy="5" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#su)" stroke-width="3.5" opacity="0.1" filter="url(#ss)"/>
  <circle cx="256" cy="256" r="240" fill="#08081a"/>
  <g clip-path="url(#mc)">
    <rect x="0" y="0" width="512" height="512" fill="url(#tw)" opacity="0.3"/>
    <circle cx="256" cy="256" r="240" fill="rgba(255,255,255,0.02)"/>
    <ellipse cx="256" cy="45" rx="210" ry="115" fill="url(#hl)" opacity="0.22"/>
    <circle cx="256" cy="256" r="238" fill="none" stroke="url(#brd)" stroke-width="0.6"/>
    <circle cx="108" cy="82" r="2" fill="#e0d4ff" opacity="0.6"/>
    <circle cx="404" cy="90" r="1.8" fill="#e0d4ff" opacity="0.55"/>
    <circle cx="160" cy="58" r="1.3" fill="#e0d4ff" opacity="0.4"/>
    <circle cx="352" cy="62" r="1" fill="#e0d4ff" opacity="0.35"/>

    <!-- 地平线 -->
    <line x1="60" y1="340" x2="452" y2="340" stroke="url(#su)" stroke-width="1" opacity="0.18" stroke-linecap="round"/>

    <!-- 左人 -->
    <g transform="translate(172, 272)">
      <circle cx="18" cy="0" r="11" fill="#0c0c1d"/>
      <circle cx="18" cy="0" r="11" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
      <path d="M9 12 L9 50 L27 50 L27 12 Q18 7, 9 12Z" fill="#0c0c1d"/>
    </g>
    <!-- 右人 -->
    <g transform="translate(296, 272)">
      <circle cx="18" cy="0" r="11" fill="#0c0c1d"/>
      <circle cx="18" cy="0" r="11" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
      <path d="M9 12 L9 50 L27 50 L27 12 Q18 7, 9 12Z" fill="#0c0c1d"/>
    </g>

    <!-- 落日爱心 -->
    <circle cx="256" cy="248" r="60" fill="url(#hg)"/>
    <path d="M256 290 C256 290, 222 260, 222 238 C222 222, 236 214, 256 228 C276 214, 290 222, 290 238 C290 260, 256 290, 256 290Z"
          fill="url(#su)" filter="url(#gl)"/>
    <path d="M238 230 Q244 220, 256 228" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.35" stroke-linecap="round"/>
  </g>

  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#brd)" stroke-width="0.7"/>
  <path d="M105 116 Q170 54, 256 46 Q342 54, 407 116" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.13" stroke-linecap="round"/>
</svg>