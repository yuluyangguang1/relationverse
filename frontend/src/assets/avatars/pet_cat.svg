<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-cat" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow-cat"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg-cat)"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="160" rx="45" ry="35" fill="#FF8C00"/>
  <ellipse cx="100" cy="155" rx="35" ry="25" fill="#FFA500"/>
  
  <!-- 脖子/围脖 -->
  <ellipse cx="100" cy="130" rx="40" ry="15" fill="#FFD700" opacity="0.6"/>
  
  <!-- 头 -->
  <ellipse cx="100" cy="95" rx="45" ry="40" fill="#FF8C00"/>
  
  <!-- 耳朵 -->
  <polygon points="60,70 55,30 80,55" fill="#FF8C00"/>
  <polygon points="65,65 60,38 77,57" fill="#FFB6C1"/>
  <polygon points="140,70 145,30 120,55" fill="#FF8C00"/>
  <polygon points="135,65 140,38 123,57" fill="#FFB6C1"/>
  
  <!-- 额头花纹 -->
  <path d="M85 60 Q100 50 115 60" stroke="#E67E00" stroke-width="3" fill="none"/>
  
  <!-- 眼睛 -->
  <g filter="url(#glow-cat)">
    <ellipse cx="80" cy="90" rx="14" ry="15" fill="#2D5016"/>
    <ellipse cx="80" cy="90" rx="5" ry="14" fill="#000"/>
    <ellipse cx="83" cy="87" rx="4" ry="5" fill="white" opacity="0.8"/>
    <ellipse cx="78" cy="92" rx="2" ry="3" fill="white" opacity="0.4"/>
    
    <ellipse cx="120" cy="90" rx="14" ry="15" fill="#2D5016"/>
    <ellipse cx="120" cy="90" rx="5" ry="14" fill="#000"/>
    <ellipse cx="123" cy="87" rx="4" ry="5" fill="white" opacity="0.8"/>
    <ellipse cx="118" cy="92" rx="2" ry="3" fill="white" opacity="0.4"/>
  </g>
  
  <!-- 鼻子 -->
  <polygon points="97,103 103,103 100,108" fill="#FF69B4"/>
  
  <!-- 嘴巴 -->
  <path d="M100 108 Q95 115 88 112" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M100 108 Q105 115 112 112" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- 胡须 -->
  <line x1="45" y1="95" x2="75" y2="98" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="102" x2="75" y2="102" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="109" x2="75" y2="106" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="95" x2="125" y2="98" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="102" x2="125" y2="102" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="109" x2="125" y2="106" stroke="#333" stroke-width="1" opacity="0.5"/>
  
  <!-- 腮红 -->
  <ellipse cx="68" cy="105" rx="10" ry="5" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="132" cy="105" rx="10" ry="5" fill="#FFB6C1" opacity="0.4"/>
  
  <!-- 尾巴 -->
  <path d="M145 155 Q170 130 160 100 Q155 85 165 75" stroke="#FF8C00" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>