<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-gf_bubbly" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="skin-gf_bubbly" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#FFE4C4"/>
      <stop offset="100%" stop-color="#FFE4C4" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="shadow-gf_bubbly">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-gf_bubbly">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-gf_bubbly)"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="185" rx="55" ry="30" fill="#FF6B35" opacity="0.9"/>
  
  <!-- 脖子 -->
  <rect x="88" y="140" width="24" height="20" rx="8" fill="url(#skin-gf_bubbly)"/>
  
  <!-- 脸 -->
  <ellipse cx="100" cy="105" rx="52" ry="58" fill="url(#skin-gf_bubbly)" filter="url(#shadow-gf_bubbly)"/>
  
  <!-- 头发后层 -->
  <ellipse cx="100" cy="75" rx="58" ry="45" fill="#FF6B35"/>
  
  <!-- 头发前层 -->
  <path d="M50 85 Q60 50 100 40 Q140 50 150 85 Q145 60 100 52 Q55 60 50 85Z" fill="#FF6B35"/>
  <path d="M55 90 Q50 70 60 55" stroke="#FF6B35" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M145 90 Q150 70 140 55" stroke="#FF6B35" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- 刘海 -->
  <path d="M65 80 Q70 60 85 55 Q95 52 100 58" fill="#FF6B35"/>
  <path d="M135 80 Q130 60 115 55 Q105 52 100 58" fill="#FF6B35"/>
  
  <!-- 眼睛 -->
  <g filter="url(#glow-gf_bubbly)">
    <!-- 左眼 -->
    <ellipse cx="78" cy="105" rx="12" ry="13" fill="white"/>
    <ellipse cx="80" cy="106" rx="8" ry="9" fill="#2E4057"/>
    <ellipse cx="82" cy="104" rx="4" ry="4.5" fill="white"/>
    <ellipse cx="78" cy="108" rx="2" ry="2" fill="white" opacity="0.5"/>
    
    <!-- 右眼 -->
    <ellipse cx="122" cy="105" rx="12" ry="13" fill="white"/>
    <ellipse cx="120" cy="106" rx="8" ry="9" fill="#2E4057"/>
    <ellipse cx="122" cy="104" rx="4" ry="4.5" fill="white"/>
    <ellipse cx="118" cy="108" rx="2" ry="2" fill="white" opacity="0.5"/>
  </g>
  
  <!-- 睫毛 -->
  <path d="M66 96 Q68 93 70 96" stroke="#2E4057" stroke-width="1.5" fill="none"/>
  <path d="M72 94 Q74 91 76 94" stroke="#2E4057" stroke-width="1.5" fill="none"/>
  <path d="M124 96 Q126 93 128 96" stroke="#2E4057" stroke-width="1.5" fill="none"/>
  <path d="M130 94 Q132 91 134 94" stroke="#2E4057" stroke-width="1.5" fill="none"/>
  
  <!-- 腮红 -->
  <ellipse cx="65" cy="118" rx="12" ry="6" fill="#FF9AA2" opacity="0.5"/>
  <ellipse cx="135" cy="118" rx="12" ry="6" fill="#FF9AA2" opacity="0.5"/>
  
  <!-- 嘴巴 -->
  <path d="M90 125 Q100 132 110 125" stroke="#FF6F61" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="128" rx="6" ry="3" fill="#FF6F61" opacity="0.3"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="115" rx="3" ry="2" fill="#FFE4C4" stroke="#FF6B35" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>