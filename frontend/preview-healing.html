<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embera · 余温 — 治愈版预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f0e8;
  color: #2a2520;
  overflow: hidden;
}
.phone {
  width: 375px;
  height: 812px;
  margin: 20px auto;
  background: linear-gradient(180deg, #faf6f0 0%, #f5efe6 100%);
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 25px 80px rgba(0,0,0,0.12);
  border: 1px solid rgba(255,158,94,0.2);
}

/* ─── Tab切换 ─── */
/* 演示用顶部切换已移除，只保留下方TabBar */
.hidden { display: none !important; }

/* ─── 页面容器 ─── */
.page {
  display: none;
  width: 100%;
  height: 100%;
  position: relative;
}
.page.active { display: block; }

/* ═══ 在一起 ═══ */
.together-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.tg-1 {
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,158,94,0.35) 0%, transparent 70%);
  top: 12%; left: 50%;
  transform: translateX(-50%);
  filter: blur(60px);
  animation: float1 12s ease-in-out infinite;
}
.tg-2 {
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,217,168,0.35) 0%, transparent 70%);
  bottom: 28%; right: 10%;
  filter: blur(50px);
  animation: float2 15s ease-in-out infinite;
}
@keyframes float1 {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.3; }
  50% { transform: translateX(-50%) translateY(-20px) scale(1.08); opacity: 0.5; }
}
@keyframes float2 {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.25; }
  50% { transform: translateY(-15px) scale(1.1); opacity: 0.4; }
}

.together-glow {
  position: absolute;
  top: 32%; left: 50%;
  transform: translate(-50%, -50%);
  width: 260px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,158,94,0.2) 0%, transparent 70%);
  filter: blur(20px);
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 1; }
}

.together-body {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

.together-presence {
  position: relative;
  width: 180px; height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 60px;
}
.together-presence-halo {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 1px solid rgba(255,158,94,0.2);
  animation: haloPulse 3s ease-in-out infinite;
}
@keyframes haloPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.05); opacity: 0.6; }
}
.together-presence-avatar {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,158,94,0.3), rgba(255,94,120,0.2));
  box-shadow: 0 0 50px rgba(255,158,94,0.25), inset 0 0 30px rgba(255,217,168,0.15);
  animation: avatarBreath 4s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  filter: blur(1px) saturate(0.85);
  opacity: 0.7;
}
@keyframes avatarBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.together-state {
  margin-top: 28px;
  text-align: center;
  color: #8a847e;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 2px;
  animation: stateFade 6s ease-in-out infinite;
}
@keyframes stateFade {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.85; }
}

.together-input-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 32px;
  border-radius: 28px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,158,94,0.08);
  color: #8a847e;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 1px;
  backdrop-filter: blur(12px);
}

/* ═══ 他们 ═══ */
.they-page {
  padding: 60px 20px 80px;
}
.they-header {
  text-align: center;
  margin-bottom: 24px;
}
.they-title {
  font-size: 22px;
  font-weight: 300;
  color: #2a2520;
  letter-spacing: 4px;
}
.they-subtitle {
  font-size: 13px;
  color: #8a847e;
  margin-top: 6px;
  font-weight: 300;
  letter-spacing: 1px;
}
.they-float-area {
  position: relative;
  height: 500px;
}
.memory-fragment {
  position: absolute;
  width: 150px;
  padding: 16px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(255,158,94,0.06);
  backdrop-filter: blur(16px);
  animation: fragmentFloat 8s ease-in-out infinite;
  cursor: pointer;
}
.memory-fragment:nth-child(1) { top: 20px; left: 20px; animation-delay: 0s; }
.memory-fragment:nth-child(2) { top: 60px; left: 190px; animation-delay: -2s; }
.memory-fragment:nth-child(3) { top: 180px; left: 40px; animation-delay: -4s; }
.memory-fragment:nth-child(4) { top: 220px; left: 200px; animation-delay: -1s; }
.memory-fragment:nth-child(5) { top: 340px; left: 80px; animation-delay: -3s; }

@keyframes fragmentFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-6px) rotate(0.5deg); }
  66% { transform: translateY(-3px) rotate(-0.3deg); }
}
.memory-fragment-glow {
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  width: 50px; height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,158,94,0.2) 0%, transparent 70%);
  filter: blur(8px);
}
.memory-fragment-name {
  font-size: 14px;
  font-weight: 500;
  color: #2a2520;
  margin-bottom: 4px;
}
.memory-fragment-line {
  font-size: 11px;
  color: #8a847e;
  font-weight: 300;
  line-height: 1.4;
}
.they-add-btn {
  position: absolute;
  bottom: 40px;
  right: 20px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,158,94,0.1);
  border: 1px solid rgba(255,158,94,0.25);
  color: #FF9E5E;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(12px);
}

/* ═══ 我 ═══ */
.me-page {
  padding: 60px 24px 80px;
}
.me-header {
  text-align: center;
  margin-bottom: 32px;
}
.me-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,158,94,0.2), rgba(255,94,120,0.15));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 14px;
  box-shadow: 0 4px 24px rgba(255,158,94,0.25);
}
.me-name {
  font-size: 18px;
  font-weight: 500;
  color: #2a2520;
}
.me-status {
  margin-top: 6px;
  font-size: 13px;
  color: #8a847e;
  font-weight: 300;
  font-style: italic;
}
.me-mood-title {
  font-size: 12px;
  color: #8a847e;
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.me-mood-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.me-mood-opt {
  padding: 16px 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,158,94,0.06);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
}
.me-mood-opt.active {
  background: rgba(255,158,94,0.08);
  border-color: rgba(255,158,94,0.2);
}
.me-mood-opt-icon {
  font-size: 22px;
  margin-bottom: 6px;
  display: block;
}
.me-mood-opt-label {
  font-size: 13px;
  color: #9a948c;
}
.me-setting-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,158,94,0.05);
  color: #9a948c;
  font-size: 14px;
}
.me-setting-arrow {
  color: #b5afa6;
  font-size: 12px;
}

/* ═══ 人物空间 ═══ */
.space-page {
  height: 100%;
  position: relative;
}
.space-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #faf8f4 0%, #f5f0e8 50%, #f0eadd 100%);
  transition: background 1.5s ease;
}
.space-bg.theme-sky {
  background: linear-gradient(180deg, #e8f0f8 0%, #d8e4f0 50%, #c8d8e8 100%);
}
.space-bg.theme-memorial {
  background: linear-gradient(180deg, #f0eeea 0%, #e8e4de 50%, #e0dcd6 100%);
}

.space-topbar {
  position: absolute;
  top: 0;
  left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 48px 20px 12px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, transparent 100%);
}
.space-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(255,158,94,0.08);
  color: #9a948c;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.space-name {
  font-size: 16px;
  font-weight: 500;
  color: #2a2520;
  letter-spacing: 1px;
}
.space-tag {
  font-size: 11px;
  color: #8a847e;
  padding: 3px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,158,94,0.06);
}

.space-body {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 140px;
  position: relative;
  z-index: 2;
}

.space-presence {
  position: relative;
  width: 160px; height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.space-avatar {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,158,94,0.3), rgba(255,94,120,0.2));
  box-shadow: 0 0 40px rgba(255,158,94,0.25);
  animation: spaceAvatarBreath 5s ease-in-out infinite;
}
@keyframes spaceAvatarBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}
.space-presence-halo {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px solid rgba(255,158,94,0.1);
  animation: spaceHaloPulse 4s ease-in-out infinite;
}
@keyframes spaceHaloPulse {
  0%, 100% { transform: scale(1); opacity: 0.2; }
  50% { transform: scale(1.04); opacity: 0.5; }
}

.space-whisper {
  margin-top: 24px;
  text-align: center;
  color: #8a847e;
  font-size: 14px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 1px;
  max-width: 260px;
  line-height: 1.5;
}
.space-status {
  margin-top: 10px;
  font-size: 12px;
  color: #b5afa6;
  letter-spacing: 1px;
}

.space-actions {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}
.space-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,158,94,0.08);
  color: #9a948c;
  font-size: 12px;
  cursor: pointer;
  backdrop-filter: blur(16px);
  transition: all 0.4s;
  min-width: 80px;
  border: none;
}
.space-action-btn:hover {
  background: rgba(255,158,94,0.08);
  transform: translateY(-2px);
}
.space-action-btn.primary {
  background: rgba(255,158,94,0.25);
  border: 1px solid rgba(255,158,94,0.3);
}
.sab-icon { font-size: 22px; }
.sab-label { font-weight: 400; letter-spacing: 0.5px; }

/* 纪念模式 */
.light-candle-btn {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 24px;
  background: rgba(255,217,168,0.06);
  border: 1px solid rgba(255,217,168,0.12);
  color: #FFD9A8;
  font-size: 13px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  z-index: 10;
}

.memorial-candle {
  position: absolute;
  bottom: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 30px;
}
.candle-flame {
  width: 10px; height: 14px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: linear-gradient(to top, #FF9E5E, #FFD9A8, #fff);
  margin: 0 auto;
  animation: flameFlicker 2s ease-in-out infinite;
}
@keyframes flameFlicker {
  0%, 100% { transform: scaleY(1) scaleX(1); opacity: 0.9; }
  25% { transform: scaleY(1.1) scaleX(0.95); opacity: 1; }
  50% { transform: scaleY(0.95) scaleX(1.05); opacity: 0.85; }
  75% { transform: scaleY(1.05) scaleX(0.98); opacity: 0.95; }
}
.candle-glow {
  position: absolute;
  top: -20px; left: 50%;
  transform: translateX(-50%);
  width: 50px; height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,158,94,0.3) 0%, transparent 70%);
  filter: blur(8px);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
  50% { opacity: 0.7; transform: translateX(-50%) scale(1.2); }
}

.candle-overlay {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  animation: overlayIn 2s ease-out forwards;
}
@keyframes overlayIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.candle-light-glow {
  position: absolute;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,217,168,0.35) 0%, rgba(255,158,94,0.08) 40%, transparent 70%);
  filter: blur(40px);
  animation: glowExpand 3s ease-out forwards;
}
@keyframes glowExpand {
  from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
}
.candle-light-message {
  position: relative;
  z-index: 6;
  font-size: 18px;
  color: #FFD9A8;
  font-weight: 300;
  letter-spacing: 4px;
  opacity: 0;
  animation: messageIn 2s ease-out 1s forwards;
}
@keyframes messageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 0.9; transform: translateY(0); }
}

.hidden { display: none !important; }

/* TabBar — Liquid Glass */
.tabbar {
  position: absolute;
  bottom: 12px;
  left: 12px; right: 12px;
  height: auto;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border-radius: 999px;
  border: none;
  box-shadow:
    0 -1px 0 rgba(255, 255, 255, 0.8) inset,
    0 -8px 32px rgba(0, 0, 0, 0.06),
    0 0 0 1px rgba(255, 255, 255, 0.35);
  overflow: hidden;
}
.tabbar::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 40%, transparent 100%);
  pointer-events: none;
  mix-blend-mode: overlay;
}
.tabbar::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10%;
  right: 10%;
  height: 1px;
  background: rgba(255, 158, 94, 0.3);
  filter: blur(2px);
  pointer-events: none;
}
.tabbar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: none;
  color: #8a847e;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.3s;
  padding: 8px 16px;
  border-radius: 999px;
  position: relative;
  z-index: 1;
}
.tabbar-item.active {
  color: #FF9E5E;
  background: linear-gradient(135deg, rgba(255,158,94,0.2), rgba(255,94,120,0.05));
  box-shadow: 0 0 16px rgba(255,158,94,0.15);
}
.tabbar-item .icon {
  font-size: 20px;
}
</style>
</head>
<body>

<div class="phone">

  <!-- ═══ 在一起 ═══ -->
  <div class="page active" id="page-together">
    <div class="together-bg">
      <div class="tg-1"></div>
      <div class="tg-2"></div>
    </div>
    <div class="together-glow"></div>
    <div class="together-body">
      <div class="together-presence">
        <div class="together-presence-halo"></div>
        <div class="together-presence-avatar">🌙</div>
      </div>
      <div class="together-state">TA 在这里 ...</div>
    </div>
    <div class="together-input-hint">想说点什么吗...</div>

    <nav class="tabbar">
      <button class="tabbar-item active"><span class="icon">🌙</span><span>在一起</span></button>
      <button class="tabbar-item"><span class="icon">🫧</span><span>他们</span></button>
      <button class="tabbar-item"><span class="icon">🍃</span><span>我</span></button>
    </nav>
  </div>

  <!-- ═══ 他们 ═══ -->
  <div class="page" id="page-they">
    <div class="they-page">
      <div class="they-header">
        <div class="they-title">他们</div>
        <div class="they-subtitle">你心里的那些人</div>
      </div>
      <div class="they-float-area">
        <div class="memory-fragment" onclick="switchTab('space')">
          <div class="memory-fragment-glow"></div>
          <div class="memory-fragment-name">林婉儿</div>
          <div class="memory-fragment-line">她总是笑着</div>
        </div>
        <div class="memory-fragment">
          <div class="memory-fragment-glow"></div>
          <div class="memory-fragment-name">橘子</div>
          <div class="memory-fragment-line">一只橘猫</div>
        </div>
        <div class="memory-fragment" onclick="switchTab('memorial')">
          <div class="memory-fragment-glow"></div>
          <div class="memory-fragment-name">爸爸</div>
          <div class="memory-fragment-line">怀念那个人</div>
        </div>
        <div class="memory-fragment">
          <div class="memory-fragment-glow"></div>
          <div class="memory-fragment-name">陈默</div>
          <div class="memory-fragment-line">话不多但可靠</div>
        </div>
        <div class="memory-fragment">
          <div class="memory-fragment-glow"></div>
          <div class="memory-fragment-name">小雪</div>
          <div class="memory-fragment-line">活泼的萨摩耶</div>
        </div>
      </div>
    </div>
    <div class="they-add-btn">＋</div>

    <nav class="tabbar">
      <button class="tabbar-item"><span class="icon">🌙</span><span>在一起</span></button>
      <button class="tabbar-item active"><span class="icon">🫧</span><span>他们</span></button>
      <button class="tabbar-item"><span class="icon">🍃</span><span>我</span></button>
    </nav>
  </div>

  <!-- ═══ 我 ═══ -->
  <div class="page" id="page-me">
    <div class="me-page">
      <div class="me-header">
        <div class="me-avatar">🍃</div>
        <div class="me-name">测试用户</div>
        <div class="me-status">"今天有点累"</div>
      </div>

      <div class="me-mood-title">你希望被怎样陪伴？</div>
      <div class="me-mood-options">
        <div class="me-mood-opt">
          <span class="me-mood-opt-icon">💬</span>
          <span class="me-mood-opt-label">多说一点</span>
        </div>
        <div class="me-mood-opt">
          <span class="me-mood-opt-icon">🌙</span>
          <span class="me-mood-opt-label">安静一点</span>
        </div>
        <div class="me-mood-opt active">

<script>
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
}

function lightCandleDemo() {
  document.querySelector('.light-candle-btn').classList.add('hidden');
  document.getElementById('candle-overlay-demo').classList.remove('hidden');
}
</script>
