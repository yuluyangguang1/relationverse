<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>余温 - 图标预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FFF5EB 0%, #FFE8D6 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #FF9E5E;
      margin-bottom: 40px;
      font-size: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }
    .icon-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255, 158, 94, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .icon-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(255, 158, 94, 0.2);
    }
    .icon-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 15px;
      /* 保持图标原始比例，但限制尺寸 */
      max-width: 100%;
      height: auto;
    }
    .icon-name {
      color: #333;
      font-size: 1rem;
      font-weight: 600;
    }
    .icon-filename {
      color: #999;
      font-size: 0.75rem;
      margin-top: 5px;
      word-break: break-all;
    }
    .section-title {
      color: #FF5E78;
      font-size: 1.5rem;
      margin: 40px 0 20px;
      padding-left: 15px;
      border-left: 4px solid #FF9E5E;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 余温图标系统 (18个)</h1>
    
    <div class="grid">
      <div class="icon-card">
        <img src="src/assets/icons/亲密度显示.png" alt="亲密度显示" class="icon-img">
        <div class="icon-name">亲密度显示</div>
        <div class="icon-filename">亲密度显示.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/他们.png" alt="他们" class="icon-img">
        <div class="icon-name">他们</div>
        <div class="icon-filename">他们.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/发送按钮.png" alt="发送按钮" class="icon-img">
        <div class="icon-name">发送按钮</div>
        <div class="icon-filename">发送按钮.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/在一起.png" alt="在一起" class="icon-img">
        <div class="icon-name">在一起</div>
        <div class="icon-filename">在一起.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/对话.png" alt="对话" class="icon-img">
        <div class="icon-name">对话</div>
        <div class="icon-filename">对话.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/我的.png" alt="我的" class="icon-img">
        <div class="icon-name">我的</div>
        <div class="icon-filename">我的.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/搜索.png" alt="搜索" class="icon-img">
        <div class="icon-name">搜索</div>
        <div class="icon-filename">搜索.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/收藏.png" alt="收藏" class="icon-img">
        <div class="icon-name">收藏</div>
        <div class="icon-filename">收藏.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/数字怀念.png" alt="数字怀念" class="icon-img">
        <div class="icon-name">数字怀念</div>
        <div class="icon-filename">数字怀念.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/日记.png" alt="日记" class="icon-img">
        <div class="icon-name">日记</div>
        <div class="icon-filename">日记.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/更多.png" alt="更多" class="icon-img">
        <div class="icon-name">更多</div>
        <div class="icon-filename">更多.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/消息通知.png" alt="消息通知" class="icon-img">
        <div class="icon-name">消息通知</div>
        <div class="icon-filename">消息通知.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/用户头像.png" alt="用户头像" class="icon-img">
        <div class="icon-name">用户头像</div>
        <div class="icon-filename">用户头像.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/礼物.png" alt="礼物" class="icon-img">
        <div class="icon-name">礼物</div>
        <div class="icon-filename">礼物.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/设置.png" alt="设置" class="icon-img">
        <div class="icon-name">设置</div>
        <div class="icon-filename">设置.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/语音输入.png" alt="语音输入" class="icon-img">
        <div class="icon-name">语音输入</div>
        <div class="icon-filename">语音输入.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/返回.png" alt="返回" class="icon-img">
        <div class="icon-name">返回</div>
        <div class="icon-filename">返回.png</div>
      </div>
      <div class="icon-card">
        <img src="src/assets/icons/陪伴.png" alt="陪伴" class="icon-img">
        <div class="icon-name">陪伴</div>
        <div class="icon-filename">陪伴.png</div>
      </div>
    </div>
  </div>
  
  <script>
    // 点击图标卡片可查看原图
    document.querySelectorAll('.icon-card').forEach(card => {
      card.addEventListener('click', () => {
        const img = card.querySelector('img');
        const newWin = window.open(img.src, '_blank');
      });
    });
  </script>
</body>
</html>
