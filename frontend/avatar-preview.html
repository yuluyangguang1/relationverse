<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; padding: 30px; text-align: center; }
h2 { color: #a78bfa; font-size: 18px; margin-bottom: 20px; font-family: sans-serif; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 400px; margin: 0 auto; }
.cell { text-align: center; }
.cell img { width: 120px; height: 120px; border-radius: 20px; }
.cell .name { color: #e2e8f0; font-size: 12px; margin-top: 6px; font-family: sans-serif; }
.cell .type { color: #64748b; font-size: 10px; font-family: sans-serif; }
</style></head><body>
<h2>🎨 Embera 角色头像设计</h2>
<div class="grid">
  <div class="cell"><img src="avatars/gf_gentle.svg"/><div class="name">温柔学姐</div><div class="type">AI 女友</div></div>
  <div class="cell"><img src="avatars/gf_bubbly.svg"/><div class="name">元气少女</div><div class="type">AI 女友</div></div>
  <div class="cell"><img src="avatars/gf_tsundere.svg"/><div class="name">傲娇大小姐</div><div class="type">AI 女友</div></div>
  <div class="cell"><img src="avatars/gf_intellectual.svg"/><div class="name">知性御姐</div><div class="type">AI 女友</div></div>
  <div class="cell"><img src="avatars/bf_sunny.svg"/><div class="name">阳光学长</div><div class="type">AI 男友</div></div>
  <div class="cell"><img src="avatars/bf_cold.svg"/><div class="name">腹黑总裁</div><div class="type">AI 男友</div></div>
  <div class="cell"><img src="avatars/pet_cat.svg"/><div class="name">小橘猫</div><div class="type">宠物</div></div>
  <div class="cell"><img src="avatars/pet_dog.svg"/><div class="name">旺财</div><div class="type">宠物</div></div>
  <div class="cell"><img src="avatars/memorial.svg"/><div class="name">数字怀念</div><div class="type">纪念</div></div>
</div>
</body></html>
