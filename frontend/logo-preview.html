<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embera Logo Preview</title>
<style>
  body {
    margin: 0;
    background: #0a0a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 60px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  }
  .logo-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .label {
    color: #666;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .row {
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .dark-bg {
    background: #0a0a14;
    padding: 40px;
    border-radius: 20px;
    border: 1px solid #1e1e2e;
  }
  .light-bg {
    background: #f5f5f7;
    padding: 40px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="logo-group">
  <div class="label">Icon (100×100)</div>
  <div class="row">
    <div class="dark-bg">
      <img src="src/assets/logo-icon.svg" width="100" height="100">
    </div>
    <div class="light-bg">
      <img src="src/assets/logo-icon.svg" width="100" height="100">
    </div>
  </div>
</div>

<div class="logo-group">
  <div class="label">Full Logo</div>
  <div class="row">
    <div class="dark-bg">
      <img src="src/assets/logo.svg" width="280" height="90">
    </div>
  </div>
</div>

<div class="logo-group">
  <div class="label">Header Bar Logo</div>
  <div class="row">
    <div class="dark-bg">
      <img src="src/assets/logo-header.svg" width="200" height="34">
    </div>
  </div>
</div>

<div class="logo-group">
  <div class="label">Mono (for watermark / print)</div>
  <div class="row">
    <div class="dark-bg" style="color:#FF9E5E;">
      <img src="src/assets/logo-mono.svg" width="80" height="80" style="color:#FF9E5E;">
    </div>
    <div class="light-bg" style="color:#FF5E78;">
      <img src="src/assets/logo-mono.svg" width="80" height="80" style="color:#FF5E78;">
    </div>
  </div>
</div>

</body>
</html>
