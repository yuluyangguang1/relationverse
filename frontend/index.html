<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关系宇宙 — RelationVerse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --card: #141420;
      --primary: #8b5cf6;
      --primary-light: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --border: #1e1e2e;
      --success: #22c55e;
      --love: #f472b6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* 顶部导航 */
    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 20px;
      background: linear-gradient(135deg, var(--primary), var(--love));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    /* 主内容区 */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    /* 角色卡片区 */
    .section-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .character-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .character-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .character-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
      border-color: var(--primary);
    }
    .character-card .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .character-card .name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .character-card .type {
      font-size: 12px;
      color: var(--text-muted);
    }
    .character-card .intimacy {
      margin-top: 8px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .character-card .intimacy .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    /* 添加按钮 */
    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      min-height: 140px;
    }
    .add-card:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .add-card .plus {
      font-size: 32px;
      line-height: 1;
    }
    /* 底部导航 */
    .tab-bar {
      display: flex;
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 0;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
      font-size: 12px;
    }
    .tab.active {
      color: var(--primary);
    }
    .tab .icon {
      font-size: 22px;
    }
    /* 气泡背景 */
    .bg-decoration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .bg-decoration .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.03;
      background: var(--primary);
    }
  </style>
</head>
<body>
  <div class="bg-decoration">
    <div class="bubble" style="width:300px;height:300px;top:-100px;left:-100px"></div>
    <div class="bubble" style="width:200px;height:200px;bottom:20%;right:-50px"></div>
    <div class="bubble" style="width:150px;height:150px;top:40%;left:60%"></div>
  </div>

  <div class="app">
    <header class="header">
      <h1>🌌 关系宇宙</h1>
      <div class="avatar">👤</div>
    </header>

    <main class="main" id="main">
      <!-- 恋人 -->
      <div class="section-title">💕 恋人</div>
      <div class="character-grid" id="lovers">
        <!-- 动态填充 -->
      </div>

      <!-- 宠物 -->
      <div class="section-title">🐾 宠物</div>
      <div class="character-grid" id="pets">
        <!-- 动态填充 -->
      </div>

      <!-- 数字怀念 -->
      <div class="section-title">🕊️ 数字怀念</div>
      <div class="character-grid" id="memorials">
        <!-- 动态填充 -->
      </div>

      <!-- 朋友/家人 -->
      <div class="section-title">🤝 社交关系</div>
      <div class="character-grid" id="social">
        <!-- 动态填充 -->
      </div>
    </main>

    <nav class="tab-bar">
      <div class="tab active">
        <span class="icon">🏠</span>
        <span>首页</span>
      </div>
      <div class="tab">
        <span class="icon">💬</span>
        <span>消息</span>
      </div>
      <div class="tab">
        <span class="icon">➕</span>
        <span>发现</span>
      </div>
      <div class="tab">
        <span class="icon">⚙️</span>
        <span>我的</span>
      </div>
    </nav>
  </div>

  <script>
    const API = 'http://localhost:8000/api';
    
    // 颜色映射
    const COLORS = {
      girlfriend: '#f472b6',
      boyfriend: '#60a5fa',
      pet: '#fbbf24',
      memorial: '#a78bfa',
      friend: '#34d399',
      family: '#fb923c',
      mentor: '#38bdf8',
      fantasy: '#e879f9',
    };
    
    // 物种 emoji
    const SPECIES_EMOJI = {
      cat: '🐱', dog: '🐶', rabbit: '🐰',
      panda: '🐼', fox: '🦊', dragon: '🐉', robot: '🤖',
    };
    
    // 加载角色列表
    async function loadCharacters() {
      try {
        const res = await fetch(`${API}/characters/list`);
        const data = await res.json();
        
        const lovers = document.getElementById('lovers');
        const social = document.getElementById('social');
        
        // 清空
        lovers.innerHTML = '';
        social.innerHTML = '';
        
        data.characters.forEach(c => {
          const card = createCharacterCard(c);
          if (c.type === 'girlfriend' || c.type === 'boyfriend') {
            lovers.innerHTML += card;
          } else {
            social.innerHTML += card;
          }
        });
        
        // 添加按钮
        lovers.innerHTML += createAddCard('lover');
        social.innerHTML += createAddCard('social');
      } catch (e) {
        console.error('加载角色失败:', e);
      }
    }
    
    // 加载宠物列表
    async function loadPets() {
      try {
        const res = await fetch(`${API}/pets/list`);
        const data = await res.json();
        
        const pets = document.getElementById('pets');
        pets.innerHTML = '';
        
        data.pets.forEach(p => {
          const color = COLORS.pet;
          pets.innerHTML += `
            <div class="character-card" onclick="interactPet('${p.id}')">
              <div class="avatar" style="background:${color}20">${SPECIES_EMOJI[p.species] || '🐾'}</div>
              <div class="name">${p.name}</div>
              <div class="type">Lv.${p.level} · 亲密度 ${p.intimacy.toFixed(0)}%</div>
              <div class="intimacy">
                <div class="fill" style="width:${p.intimacy}%;background:${color}"></div>
              </div>
            </div>
          `;
        });
        
        pets.innerHTML += createAddCard('pet');
      } catch (e) {
        console.error('加载宠物失败:', e);
      }
    }
    
    // 加载怀念角色
    async function loadMemorials() {
      try {
        const res = await fetch(`${API}/memorial/list`);
        const data = await res.json();
        
        const memorials = document.getElementById('memorials');
        memorials.innerHTML = '';
        
        data.memorials.forEach(m => {
          const color = COLORS.memorial;
          memorials.innerHTML += `
            <div class="character-card" onclick="chatMemorial('${m.id}')">
              <div class="avatar" style="background:${color}20">🕊️</div>
              <div class="name">${m.name}</div>
              <div class="type">${m.relation_type} · ${m.stories_count} 个故事</div>
            </div>
          `;
        });
        
        memorials.innerHTML += createAddCard('memorial');
      } catch (e) {
        console.error('加载怀念角色失败:', e);
      }
    }
    
    // 创建角色卡片 HTML
    function createCharacterCard(c) {
      const color = COLORS[c.type] || '#8b5cf6';
      const emoji = c.type === 'girlfriend' ? '💕' : c.type === 'boyfriend' ? '💙' : '🤝';
      return `
        <div class="character-card" onclick="chatCharacter('${c.id}')">
          <div class="avatar" style="background:${color}20">${emoji}</div>
          <div class="name">${c.name}</div>
          <div class="type">${c.relationship_stage} · ${c.total_messages} 条消息</div>
          <div class="intimacy">
            <div class="fill" style="width:${c.intimacy_level}%;background:${color}"></div>
          </div>
        </div>
      `;
    }
    
    // 创建添加按钮卡片
    function createAddCard(type) {
      return `
        <div class="character-card add-card" onclick="addNew('${type}')">
          <span class="plus">+</span>
          <span>添加</span>
        </div>
      `;
    }
    
    // 跳转到聊天
    function chatCharacter(id) {
      alert('聊天功能即将上线！角色 ID: ' + id);
    }
    
    function interactPet(id) {
      alert('宠物互动即将上线！宠物 ID: ' + id);
    }
    
    function chatMemorial(id) {
      alert('数字怀念对话即将上线！角色 ID: ' + id);
    }
    
    function addNew(type) {
      alert('创建' + type + '功能即将上线！');
    }
    
    // 初始化
    loadCharacters();
    loadPets();
    loadMemorials();
  </script>
</body>
</html>
