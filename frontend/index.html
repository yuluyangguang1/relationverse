<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>关系宇宙 — RelationVerse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════════ -->
<!-- 首页 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-home" class="page active">
  <header class="header">
    <div class="header-left">
      <span class="header-title gradient">🌌 关系宇宙</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="router.go('create')">➕</button>
    </div>
  </header>

  <div class="main" id="home-main">
    <!-- 恋人 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">💕 恋人</span>
        <span class="section-more" onclick="router.go('create', {type:'lover'})">添加 +</span>
      </div>
      <div class="card-grid" id="home-lovers"></div>
    </div>

    <!-- 宠物 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🐾 宠物</span>
        <span class="section-more" onclick="router.go('create', {type:'pet'})">领养 +</span>
      </div>
      <div class="card-grid" id="home-pets"></div>
    </div>

    <!-- 数字怀念 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🕊️ 数字怀念</span>
        <span class="section-more" onclick="router.go('create', {type:'memorial'})">纪念 +</span>
      </div>
      <div class="card-grid" id="home-memorials"></div>
    </div>

    <!-- 社交关系 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🤝 社交关系</span>
        <span class="section-more" onclick="router.go('create', {type:'social'})">添加 +</span>
      </div>
      <div class="card-grid" id="home-social"></div>
    </div>
  </div>

  <nav class="tabbar">
    <button class="tabbar-item active" data-page="home" onclick="router.go('home')">
      <span class="icon">🏠</span><span>首页</span>
    </button>
    <button class="tabbar-item" data-page="chat-list" onclick="router.go('chat-list')">
      <span class="icon">💬</span><span>消息</span>
    </button>
    <button class="tabbar-item" data-page="create" onclick="router.go('create')">
      <span class="icon">➕</span><span>创建</span>
    </button>
    <button class="tabbar-item" data-page="profile" onclick="router.go('profile')">
      <span class="icon">👤</span><span>我的</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- 聊天页面 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-chat" class="page">
  <header class="header">
    <div class="header-left">
      <button class="header-back" onclick="router.go('home')">←</button>
      <div>
        <div class="header-title" id="chat-char-name">聊天中</div>
        <div style="font-size:11px;color:var(--text-muted)" id="chat-char-stage"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="chat-voice-btn" onclick="toggleVoiceMode()">🔊</button>
      <button class="header-btn" onclick="showCharInfo()">⋯</button>
    </div>
  </header>

  <div class="main" id="chat-messages" style="display:flex;flex-direction:column;">
    <div style="flex:1"></div>
    <div id="chat-msg-list" class="chat-messages"></div>
  </div>

  <div class="chat-input-area">
    <button class="chat-voice" id="chat-mic-btn" onclick="toggleRecording()">🎤</button>
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="输入消息..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="autoResize(this)"></textarea>
    <button class="chat-send" id="chat-send-btn" onclick="sendChat()">➤</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- 消息列表页 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-chat-list" class="page">
  <header class="header">
    <div class="header-left">
      <span class="header-title">💬 消息</span>
    </div>
  </header>
  <div class="main" id="chat-list-main">
    <div id="chat-list-content"></div>
  </div>
  <nav class="tabbar">
    <button class="tabbar-item" data-page="home" onclick="router.go('home')">
      <span class="icon">🏠</span><span>首页</span>
    </button>
    <button class="tabbar-item active" data-page="chat-list" onclick="router.go('chat-list')">
      <span class="icon">💬</span><span>消息</span>
    </button>
    <button class="tabbar-item" data-page="create" onclick="router.go('create')">
      <span class="icon">➕</span><span>创建</span>
    </button>
    <button class="tabbar-item" data-page="profile" onclick="router.go('profile')">
      <span class="icon">👤</span><span>我的</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- 创建角色页 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-create" class="page">
  <header class="header">
    <div class="header-left">
      <button class="header-back" onclick="router.go('home')">←</button>
      <span class="header-title">创建角色</span>
    </div>
  </header>
  <div class="main" id="create-main" style="padding:20px;">
    <!-- 步骤 1：选择类型 -->
    <div id="create-step1">
      <div class="section-title mb-2">选择类型</div>
      <div class="persona-grid" id="create-type-grid"></div>
    </div>

    <!-- 步骤 2：选择人设 -->
    <div id="create-step2" class="hidden">
      <div class="section-title mb-2">选择人设</div>
      <div class="persona-grid" id="create-persona-grid"></div>
      <div class="form-group mt-3">
        <label class="form-label">自定义昵称（可选）</label>
        <input class="form-input" id="create-custom-name" placeholder="给 TA 起个名字...">
      </div>
      <button class="btn btn-primary btn-block" onclick="doCreateCharacter()">✨ 创建</button>
    </div>
  </div>
  <nav class="tabbar">
    <button class="tabbar-item" data-page="home" onclick="router.go('home')">
      <span class="icon">🏠</span><span>首页</span>
    </button>
    <button class="tabbar-item" data-page="chat-list" onclick="router.go('chat-list')">
      <span class="icon">💬</span><span>消息</span>
    </button>
    <button class="tabbar-item active" data-page="create" onclick="router.go('create')">
      <span class="icon">➕</span><span>创建</span>
    </button>
    <button class="tabbar-item" data-page="profile" onclick="router.go('profile')">
      <span class="icon">👤</span><span>我的</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- 宠物互动页 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-pet" class="page">
  <header class="header">
    <div class="header-left">
      <button class="header-back" onclick="router.go('home')">←</button>
      <span class="header-title" id="pet-name">宠物</span>
    </div>
  </header>
  <div class="main" style="padding:20px;" id="pet-main">
    <div id="pet-avatar-display" style="text-align:center;font-size:80px;margin:20px 0;">🐱</div>
    <div id="pet-speech" style="text-align:center;color:var(--text2);font-size:15px;margin-bottom:20px;font-style:italic;">
      "喵~"
    </div>

    <div class="pet-stats" id="pet-stats-grid"></div>

    <div class="pet-actions" id="pet-actions-grid"></div>

    <div class="section mt-3">
      <div class="section-title">📊 成长</div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px;margin-top:8px;border:1px solid var(--border);">
        <div class="flex justify-between mb-2">
          <span style="color:var(--text2);font-size:13px;">等级</span>
          <span id="pet-level" style="font-weight:600;">Lv.1</span>
        </div>
        <div class="flex justify-between mb-2">
          <span style="color:var(--text2);font-size:13px;">亲密度</span>
          <span id="pet-intimacy-val" style="font-weight:600;">0%</span>
        </div>
        <div class="flex justify-between">
          <span style="color:var(--text2);font-size:13px;">说话能力</span>
          <span id="pet-speak-val" style="font-weight:600;">0%</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- 个人中心页 -->
<!-- ═══════════════════════════════════════════ -->
<div id="page-profile" class="page">
  <header class="header">
    <div class="header-left">
      <span class="header-title">👤 我的</span>
    </div>
  </header>
  <div class="main" style="padding:20px;">
    <div style="text-align:center;margin:30px 0;">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:36px;">👤</div>
      <div style="font-size:18px;font-weight:600;margin-top:12px;">测试用户</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">免费用户</div>
    </div>

    <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;">
      <div class="flex items-center justify-between" style="padding:16px;border-bottom:1px solid var(--border);">
        <span>💎 订阅等级</span>
        <span style="color:var(--text-muted);">免费</span>
      </div>
      <div class="flex items-center justify-between" style="padding:16px;border-bottom:1px solid var(--border);">
        <span>💬 今日消息</span>
        <span style="color:var(--text-muted);">0 / 20</span>
      </div>
      <div class="flex items-center justify-between" style="padding:16px;border-bottom:1px solid var(--border);">
        <span>🔗 API 地址</span>
        <span style="color:var(--text-muted);font-size:12px;" id="profile-api-url"></span>
      </div>
      <div class="flex items-center justify-between" style="padding:16px;cursor:pointer;" onclick="showToast('功能开发中')">
        <span>⚙️ 设置</span>
        <span style="color:var(--text-muted);">→</span>
      </div>
    </div>

    <div style="text-align:center;margin-top:40px;color:var(--text-dim);font-size:12px;">
      RelationVerse v0.1.0<br>
      AI 关系宇宙 — 让每个人拥有真实的情感连接
    </div>
  </div>
  <nav class="tabbar">
    <button class="tabbar-item" data-page="home" onclick="router.go('home')">
      <span class="icon">🏠</span><span>首页</span>
    </button>
    <button class="tabbar-item" data-page="chat-list" onclick="router.go('chat-list')">
      <span class="icon">💬</span><span>消息</span>
    </button>
    <button class="tabbar-item" data-page="create" onclick="router.go('create')">
      <span class="icon">➕</span><span>创建</span>
    </button>
    <button class="tabbar-item active" data-page="profile" onclick="router.go('profile')">
      <span class="icon">👤</span><span>我的</span>
    </button>
  </nav>
</div>

</div><!-- /#app -->

<script src="src/app.js"></script>
<script src="src/pages.js"></script>
</body>
</html>
